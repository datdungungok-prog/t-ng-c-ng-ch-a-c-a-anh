<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Công Chúa Của Anh</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: #ffebee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Hiệu ứng trái tim bay nền */
        .heart-bg {
            position: absolute; color: #ff80ab; font-size: 20px;
            user-select: none; animation: move 4s linear infinite; opacity: 0;
        }
        @keyframes move {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* Khung nội dung chính */
        .card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center; z-index: 10; max-width: 400px;
            border: 2px solid #ff80ab; transition: 0.5s;
        }

        h1 { color: #d81b60; font-size: 24px; }
        p { color: #555; line-height: 1.6; font-size: 18px; }

        .btn {
            background-color: #ff80ab; color: white; border: none;
            padding: 12px 25px; border-radius: 50px; cursor: pointer;
            transition: 0.3s; font-size: 16px; margin-top: 20px;
        }
        .btn:hover { background-color: #f06292; transform: scale(1.1); }

        /* Lớp phủ hiệu ứng đặc biệt khi bấm nút */
        #special-surprise {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(255, 235, 238, 0.9);
            z-index: 100; flex-direction: column;
            justify-content: center; align-items: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .big-heart {
            font-size: 150px; color: #ff1744;
            animation: pulse 0.8s infinite alternate;
            margin-bottom: 20px;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .kiss-gif {
            width: 250px; border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .close-btn {
            margin-top: 30px; color: #d81b60; cursor: pointer;
            text-decoration: underline; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <h1>Gửi Thanh Như ❤️</h1>
        <p>Em iu ơi anh biết là em iu cảm thấy tuổi thân nhiều lắm, anh tặng em iu cái này nè<3</p>
        <p><i>"Em iu của anh cười lên nha, anh mong là em iu của anh sẽ hết thấy tuổi thân ạ"</i></p>
        <button class="btn" onclick="showSurprise()">Nhấn vào đây nè</button>
    </div>

    <div id="special-surprise">
        <div class="big-heart">❤️</div>
        <img class="kiss-gif" src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExdng2bDQ4dngzcDRrYWlweHNtODFnaWk3cWhzdHBmNzE2anVxcnR5MCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/ytu2GUYbvhz7zShGwS/giphy.gif" alt="Kiss">
        <p style="color: #d81b60; font-weight: bold; font-size: 20px; margin-top: 20px;">
            Anh êu em nhiều lắm! Moazzzz! 😘
        </p>
        <div class="close-btn" onclick="hideSurprise()">Quay lại</div>
    </div>

    <script>
        // Tạo trái tim bay nền
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300); // Tạo tim liên tục cho đẹp

        function showSurprise() {
            document.getElementById('special-surprise').style.display = 'flex';
        }

        function hideSurprise() {
            document.getElementById('special-surprise').style.display = 'none';
        }
    </script>
</body>
</html>
